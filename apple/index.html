  <script src="../main.js"></script>
  <script>
    (function() {
      var imgs = document.querySelectorAll('.apple-gallery-inner img');
      var maxScale = window.innerWidth <= 768 ? 1.25 : 1.5;
      var minScale = 1;
      var ticking = false;

      function update() {
        var vh = window.innerHeight;
        var centre = vh / 2;
        var buffer = vh * 1.5;

        for (var i = 0; i < imgs.length; i++) {
          var rect = imgs[i].getBoundingClientRect();
          if (rect.bottom < -buffer || rect.top > vh + buffer) continue;
          var imgCentre = rect.top + rect.height / 2;
          var distance = Math.abs(centre - imgCentre);
          var range = vh * 0.8;
          var t = Math.max(0, 1 - distance / range);
          var scale = minScale + (maxScale - minScale) * t * t;
          imgs[i].style.transform = 'scale(' + scale + ')';
        }

        ticking = false;
      }

      function onScroll() {
        if (!ticking) {
          ticking = true;
          requestAnimationFrame(update);
        }
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      update();
    })();
  </script>
